services:
  - type: web
    name: eldergo-kl-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn app.main:app --chdir backend -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: ELDERGO_ENV
        value: production
      - key: ELDERGO_DEMO_MODE
        value: "true"
      - key: ELDERGO_CORS_ORIGINS
        value: https://eldergo-kl-frontend.onrender.com
      - key: ELDERGO_DATABASE_URL
        sync: false
      - key: ELDERGO_GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

  - type: web
    name: eldergo-kl-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://eldergo-kl-api.onrender.com
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
