# ElderGo KL — Render Blueprint
# After deploy: GET https://<api-host>/api/v1/health/data (CSV + Gemini key count)
# and smoke-test the AI chatbot on the static frontend.

services:
  - type: web
    name: eldergo-kl-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn app.main:app --chdir backend -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: ELDERGO_ENV
        value: production
      # Set false in Dashboard when Postgres is imported and you want route persistence.
      - key: ELDERGO_DEMO_MODE
        sync: false
      - key: ELDERGO_CORS_ORIGINS
        value: https://eldergo-kl-frontend.onrender.com
      - key: ELDERGO_DATABASE_URL
        sync: false
      - key: ELDERGO_GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ELDERGO_GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ELDERGO_GEMINI_API_KEY_PRIMARY
        sync: false
      - key: ELDERGO_GEMINI_API_KEY_SECONDARY
        sync: false
      - key: ELDERGO_GEMINI_API_KEYS
        sync: false
      - key: ELDERGO_AI_GUARDRAIL_ENABLED
        value: "true"
      - key: ELDERGO_AI_GUARDRAIL_MODE
        value: hybrid
      - key: ELDERGO_AI_GUARDRAIL_STRICT
        value: "false"

  - type: web
    name: eldergo-kl-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://eldergo-kl-api.onrender.com
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_BROWSER_KEY
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
